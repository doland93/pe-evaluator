name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyinstaller pdfplumber pymupdf python-docx openpyxl
      - run: pyinstaller --onefile --windowed --name "PE-Evaluator" peer_eval.py
      - uses: actions/upload-artifact@v4
        with:
          name: PE-Evaluator-Windows
          path: dist/PE-Evaluator.exe
          retention-days: 30
